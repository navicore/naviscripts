# Hyprland config

# -- Monitor --
# auto-detect monitor, preferred resolution, no offset, scale 1
monitor = , preferred, auto, 1

# -- Startup --
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle

# -- General --
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(6a8799ff) rgba(909d63ff) 45deg
    col.inactive_border = rgba(636363aa)
    layout = dwindle
}

# -- Input --
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# -- Decoration --
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 4
        passes = 2
    }
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1a1aee)
    }
}

# -- Animations --
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 4, ease
    animation = windowsOut, 1, 4, ease, popin 80%
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 4, ease
}

# -- Layout --
dwindle {
    pseudotile = true
    preserve_split = true
}

# -- Keybinds --
$mod = SUPER

# Applications
bind = $mod, Return, exec, ghostty
bind = $mod, D, exec, wofi --show drun
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit

# Window focus (vim-style + arrows)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows (vim-style + arrows)
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize windows
bind = $mod CTRL, H, resizeactive, -40 0
bind = $mod CTRL, L, resizeactive, 40 0
bind = $mod CTRL, K, resizeactive, 0 -40
bind = $mod CTRL, J, resizeactive, 0 40
bind = $mod CTRL, left, resizeactive, -40 0
bind = $mod CTRL, right, resizeactive, 40 0
bind = $mod CTRL, up, resizeactive, 0 -40
bind = $mod CTRL, down, resizeactive, 0 40

# Layout toggles
bind = $mod, R, togglesplit
bind = $mod, F, fullscreen, 0
bind = $mod, V, togglefloating
bind = $mod, P, pseudo

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Mouse binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Scratchpad (toggle-able floating terminal)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic
